<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        var t = localStorage.getItem('fixloop-theme');
        document.documentElement.classList.add(t === 'dark' ? 'theme-dark' : 'theme-light');
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Log errors and fixes. Search when you hit the same error again. 100% local, works offline." />
    <title>FixLoop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
